<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Page — Dynamic Agentic Bridge</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    #status { padding: 12px 20px; border-radius: 8px; font-size: 18px; font-weight: bold; margin: 20px 0; }
    #status.waiting { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    #status.clicked { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    #click-btn { padding: 10px 24px; font-size: 16px; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 6px; }
    #click-btn:hover { background: #1d4ed8; }
    #click-count { margin-top: 10px; color: #6b7280; }
    input[type="text"] { padding: 8px 12px; font-size: 14px; border: 1px solid #d1d5db; border-radius: 6px; width: 200px; }
    select { padding: 8px 12px; font-size: 14px; border: 1px solid #d1d5db; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Test Page</h1>
  <p>This page is served locally for end-to-end Playwright execution testing.</p>

  <div id="status" class="waiting">⏳ Waiting for click...</div>
  <button id="click-btn" onclick="handleClick()">Click Me</button>
  <div id="click-count">Clicks: 0</div>

  <hr style="margin: 30px 0">

  <div>
    <label>Name: <input type="text" id="name-input" placeholder="Enter your name"></label>
  </div>
  <div style="margin-top: 10px;">
    <label>Color:
      <select id="color-select">
        <option value="">-- choose --</option>
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
      </select>
    </label>
  </div>
  <div id="form-output" style="margin-top: 10px; color: #374151;"></div>

  <script>
    let clickCount = 0;
    function handleClick() {
      clickCount++;
      document.getElementById('status').className = 'clicked';
      document.getElementById('status').textContent = '✅ Button clicked!';
      document.getElementById('click-count').textContent = 'Clicks: ' + clickCount;
    }

    document.getElementById('name-input').addEventListener('input', function(e) {
      document.getElementById('form-output').textContent = 'Name: ' + e.target.value;
    });
    document.getElementById('color-select').addEventListener('change', function(e) {
      document.getElementById('form-output').textContent = 'Color: ' + e.target.value;
    });
  </script>
</body>
</html>
